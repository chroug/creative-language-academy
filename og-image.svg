<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8553d"/>
      <stop offset="33%" stop-color="#e0a458"/>
      <stop offset="66%" stop-color="#1f7a6d"/>
      <stop offset="100%" stop-color="#2a4d8f"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f4d5cd"/>
      <stop offset="50%" stop-color="#d6dff0"/>
      <stop offset="100%" stop-color="#f7e3c4"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#faf6ee"/>
  <rect x="0" y="0" width="1200" height="8" fill="url(#stripe)"/>
  <circle cx="950" cy="315" r="200" fill="url(#orb)" opacity="0.85"/>
  <g transform="translate(80, 130)">
    <text font-family="Georgia, serif" font-size="22" fill="#8a8f9c" letter-spacing="3">COURS DE LANGUES — FLE · ANGLAIS · ESPAGNOL</text>
    <text y="120" font-family="Georgia, serif" font-size="84" font-weight="500" fill="#1a1f2c">Apprendre une langue,</text>
    <text y="220" font-family="Georgia, serif" font-size="84" font-style="italic" fill="#c8553d">vivre <tspan fill="#1a1f2c" font-style="normal">une langue.</tspan></text>
    <text y="320" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#4a5063">Une méthode inspirante et conviviale.</text>
    <text y="370" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#4a5063">En groupe ou en individuel.</text>
  </g>
  <g transform="translate(80, 540)">
    <rect width="44" height="44" rx="10" fill="#1a1f2c"/>
    <text x="22" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="600" fill="#faf6ee">CLA</text>
    <text x="60" y="30" font-family="Georgia, serif" font-size="22" fill="#1a1f2c">Creative Language Academy</text>
  </g>
</svg>
